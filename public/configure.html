<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Letterboxd → Stremio · Configure</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #14181c;
        --fg: #e9eef2;
        --accent: #00e054;
        --muted: #4d6878;
        --border: #2c3440;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      main {
        max-width: 480px;
        width: 100%;
      }
      h1 { margin: 0 0 8px; font-size: 24px; }
      p.lede { margin: 0 0 24px; color: var(--muted); }
      label { display: block; font-size: 13px; margin-bottom: 6px; color: var(--muted); }
      input[type="text"] {
        width: 100%;
        padding: 12px 14px;
        font-size: 16px;
        background: #1f262e;
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 6px;
      }
      input[type="text"]:focus {
        outline: none;
        border-color: var(--accent);
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
        flex-wrap: wrap;
      }
      button, a.btn {
        flex: 1 1 0;
        padding: 12px 16px;
        font-size: 15px;
        font-weight: 600;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        display: inline-block;
      }
      .primary {
        background: var(--accent);
        color: #14181c;
      }
      .primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .secondary {
        background: transparent;
        color: var(--fg);
        border: 1px solid var(--border);
      }
      .url-box {
        margin-top: 20px;
        padding: 12px;
        background: #1f262e;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 13px;
        word-break: break-all;
        display: none;
      }
      .url-box.visible { display: block; }
      .hint {
        margin-top: 12px;
        padding: 10px 12px;
        background: rgba(0, 224, 84, 0.08);
        border: 1px solid rgba(0, 224, 84, 0.3);
        border-radius: 6px;
        font-size: 13px;
        color: var(--fg);
        display: none;
      }
      .hint.visible { display: block; }
      .hint code {
        background: #1f262e;
        padding: 2px 5px;
        border-radius: 3px;
        font-size: 12px;
      }
      footer {
        margin-top: 32px;
        font-size: 12px;
        color: var(--muted);
        text-align: center;
      }
      footer a { color: var(--muted); }
    </style>
  </head>
  <body>
    <main>
      <h1>Letterboxd → Stremio</h1>
      <p class="lede">Install your Letterboxd watchlist, diary, and lists as Stremio catalogs.</p>

      <form id="form" autocomplete="off">
        <label for="username">Letterboxd username</label>
        <input id="username" name="username" type="text" placeholder="e.g. davidehrlich" required pattern="[A-Za-z0-9_]{1,32}" />
        <div class="actions">
          <button type="submit" class="primary" id="install">Install in Stremio</button>
          <button type="button" class="secondary" id="copy">Copy URL</button>
        </div>
      </form>

      <div class="url-box" id="urlBox"></div>
      <div class="hint" id="hint"></div>

      <footer>
        Open source · <a href="https://github.com/brunozampirom/letterboxd-stremio" target="_blank" rel="noopener">GitHub</a>
      </footer>
    </main>

    <script>
      window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>

    <script>
      const form = document.getElementById('form');
      const input = document.getElementById('username');
      const urlBox = document.getElementById('urlBox');
      const hint = document.getElementById('hint');
      const copyBtn = document.getElementById('copy');
      const installBtn = document.getElementById('install');

      const isLocal =
        location.hostname === 'localhost' ||
        location.hostname === '127.0.0.1' ||
        location.protocol !== 'https:';

      if (isLocal) {
        installBtn.textContent = 'Copy URL & open Stremio';
      }

      function manifestUrl(username) {
        return `${location.origin}/${username}/manifest.json`;
      }

      function stremioUrl(username) {
        return manifestUrl(username).replace(/^https?:\/\//, 'stremio://');
      }

      function showUrl(username) {
        urlBox.textContent = manifestUrl(username);
        urlBox.classList.add('visible');
      }

      function showLocalHint() {
        hint.innerHTML =
          'Local installs cannot use the <code>stremio://</code> deep link.<br>' +
          'Open <strong>Stremio</strong> → <strong>Add-ons</strong> → ' +
          '<strong>Add Add-on</strong> and paste the URL above.';
        hint.classList.add('visible');
      }

      async function copyToClipboard(text) {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch {
          return false;
        }
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const u = input.value.trim().toLowerCase();
        if (!u) return;
        showUrl(u);
        if (isLocal) {
          await copyToClipboard(manifestUrl(u));
          showLocalHint();
        } else {
          window.location.href = stremioUrl(u);
        }
      });

      copyBtn.addEventListener('click', async () => {
        const u = input.value.trim().toLowerCase();
        if (!u) return;
        showUrl(u);
        const ok = await copyToClipboard(manifestUrl(u));
        if (ok) {
          copyBtn.textContent = 'Copied!';
          setTimeout(() => (copyBtn.textContent = 'Copy URL'), 1500);
        }
      });
    </script>
  </body>
</html>
